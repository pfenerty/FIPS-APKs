package:
  name: bctls-fips
  version: 2.1.22
  epoch: 0
  description: >
    BouncyCastle FIPS TLS provider (BCTLS-FJA 2.1.22) — FIPS 140-3 compliant
    JSSE provider built on top of the bouncycastle-fips JCA core.

    Provides BouncyCastleJsseProvider, which implements TLS 1.2 and TLS 1.3
    using only FIPS-approved algorithms.  Must be used alongside bouncycastle-fips.

    The JAR is the exact binary from Maven Central
    (org.bouncycastle:bctls-fips:2.1.22); fetched without recompilation.
  copyright:
    - license: MIT
      paths:
        - usr/share/java/*

  dependencies:
    runtime:
      - bouncycastle-fips

environment:
  contents:
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    repositories:
      - https://packages.wolfi.dev/os
    packages:
      - wolfi-base

pipeline:
  # Download the JAR from Maven Central.
  # SHA-256 matches the .sha256 file published at:
  #   https://repo1.maven.org/maven2/org/bouncycastle/bctls-fips/2.1.22/bctls-fips-2.1.22.jar.sha256
  - uses: fetch
    with:
      uri: https://repo1.maven.org/maven2/org/bouncycastle/bctls-fips/2.1.22/bctls-fips-2.1.22.jar
      expected-sha256: 688410563445e1a65ff33cb67842499f0788994d752c3df8f7ea4a0d40ddbf50
      extract: false

  - runs: |
      install -Dm644 bctls-fips-2.1.22.jar \
        "${{targets.destdir}}/usr/share/java/bctls-fips-2.1.22.jar"
      ln -sf bctls-fips-2.1.22.jar \
        "${{targets.destdir}}/usr/share/java/bctls-fips.jar"
