name: Build FIPS Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless OIDC

# ── Job graph ──────────────────────────────────────────────────────────────────
#
#   build-base   (independent)
#   build-java21 (independent, builds its own packages via melange)
#
# Both jobs run in parallel. build-java21 runs melange internally so there is
# no separate packages job and no artifact passing between jobs.

jobs:

  # ── Build fips-base ─────────────────────────────────────────────────────────
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PRs publish to ttl.sh (free ephemeral registry, auto-deleted after 1h).
      # push/tag publishes to ghcr.io with :latest and optionally :<semver>.
      - name: Compute image tag
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "all=ttl.sh/fips-base-pr${{ github.event.pull_request.number }}:1h" >> $GITHUB_OUTPUT
          else
            BASE="ghcr.io/${{ github.repository_owner }}/fips-base"
            TAGS="${BASE}:latest"
            [[ "${{ github.ref_type }}" == "tag" ]] && TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
            echo "all=${TAGS}" >> $GITHUB_OUTPUT
            echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      # ttl.sh requires no auth; only log in for production pushes
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        id: publish
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/base/image.yaml
          tag: ${{ steps.tags.outputs.all }}

      # Sign by digest using keyless cosign (Sigstore Fulcio CA + Rekor log)
      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-base
          path: "*.sbom.json"
          if-no-files-found: ignore

  # ── Build fips-java21 ───────────────────────────────────────────────────────
  #
  # Follows the chainguard-dev/nginx-image-demo pattern: melange and apko run
  # in the same job. The local APK repository and ephemeral signing key are
  # written to /tmp, which apko-publish mounts into its Docker container
  # (-v /tmp:/tmp), so they are accessible to apko at the same paths declared
  # in images/java21/image.yaml.
  build-java21:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build local APK packages (bouncycastle-fips + bctls-fips) ──────────
      - uses: chainguard-dev/actions/setup-melange@main

      # Ephemeral signing key — only used to verify APK integrity within this run.
      # Key pair lands in /tmp/melange.rsa + /tmp/melange.rsa.pub, matching the
      # paths declared in images/java21/image.yaml.
      - uses: chainguard-dev/actions/melange-keygen@main
        with:
          signing-key-path: /tmp/melange.rsa

      # Build both packages sequentially (melange-build-pkg handles the ordering:
      # on the second config it auto-adds /tmp/apk-packages as a dependency repo
      # so bctls-fips can resolve its runtime dependency on bouncycastle-fips).
      - uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          multi-config: >-
            packages/bouncycastle-fips/melange.yaml,packages/bctls-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: /tmp/melange.rsa
          repository-path: /tmp/apk-packages

      # ── Build + publish image ───────────────────────────────────────────────
      - name: Compute image tag
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "all=ttl.sh/fips-java21-pr${{ github.event.pull_request.number }}:1h" >> $GITHUB_OUTPUT
          else
            BASE="ghcr.io/${{ github.repository_owner }}/fips-java21"
            TAGS="${BASE}:latest"
            [[ "${{ github.ref_type }}" == "tag" ]] && TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
            echo "all=${TAGS}" >> $GITHUB_OUTPUT
            echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Local packages are in /tmp (bind-mounted via -v /tmp:/tmp in the apko container).
      # file:///tmp/apk-packages adds them as a regular unnamed repo for all architectures,
      # matching the same --repository-append pattern used by the Makefile.
      - name: Publish
        id: publish
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/java21/image.yaml
          tag: ${{ steps.tags.outputs.all }}
          repository-append: file:///tmp/apk-packages
          keyring-append: /tmp/melange.rsa.pub

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-java21
          path: "*.sbom.json"
          if-no-files-found: ignore
