name: Build FIPS Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless OIDC

# ── Job graph ──────────────────────────────────────────────────────────────────
#
#   build-base   (independent)
#   build-java21 (independent, builds its own packages via melange)
#
# Both jobs run in parallel. build-java21 runs melange internally so there is
# no separate packages job and no artifact passing between jobs.

jobs:

  # ── Build fips-base ─────────────────────────────────────────────────────────
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PRs publish to ttl.sh (free ephemeral registry, auto-deleted after 1h).
      # push/tag publishes to ghcr.io with :latest and optionally :<semver>.
      - name: Compute image tag
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "all=ttl.sh/fips-base-pr${{ github.event.pull_request.number }}:1h" >> $GITHUB_OUTPUT
          else
            BASE="ghcr.io/${{ github.repository_owner }}/fips-base"
            TAGS="${BASE}:latest"
            [[ "${{ github.ref_type }}" == "tag" ]] && TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
            echo "all=${TAGS}" >> $GITHUB_OUTPUT
            echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      # ttl.sh requires no auth; only log in for production pushes
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        id: publish
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/base/image.yaml
          tag: ${{ steps.tags.outputs.all }}

      # Sign by digest using keyless cosign (Sigstore Fulcio CA + Rekor log)
      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-base
          path: "*.sbom.json"
          if-no-files-found: ignore

  # ── Build fips-java21 ───────────────────────────────────────────────────────
  #
  # Follows the chainguard-dev/nginx-image-demo pattern: melange and apko run
  # in the same job. The local APK repository and ephemeral signing key are
  # written to /tmp, which apko-publish mounts into its Docker container
  # (-v /tmp:/tmp), so they are accessible to apko at the same paths declared
  # in images/java21/image.yaml.
  build-java21:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build local APK packages (bouncycastle-fips + bctls-fips) ──────────
      - uses: chainguard-dev/actions/setup-melange@main

      # Ephemeral signing key — /tmp is writable by root (sudo melange) and is
      # bind-mounted inside the apko-publish container via -v /tmp:/tmp.
      - uses: chainguard-dev/actions/melange-keygen@main
        with:
          signing-key-path: /tmp/melange.rsa

      # Build packages directly and serve them over HTTP so the apko-publish
      # action can reach them. The action uses --network host, so any port we
      # open on the runner is reachable at localhost inside its container — this
      # bypasses all Docker volume-mount path issues entirely.
      - name: Build local APK packages
        run: |
          set -euo pipefail
          OUTDIR="${{ github.workspace }}/apk-packages"
          sudo mkdir -p "$OUTDIR"

          echo "=== building bouncycastle-fips ==="
          sudo melange build packages/bouncycastle-fips/melange.yaml \
            --arch x86_64,aarch64 \
            --out-dir "$OUTDIR" \
            --signing-key /tmp/melange.rsa

          echo "=== building bctls-fips ==="
          sudo melange build packages/bctls-fips/melange.yaml \
            --arch x86_64,aarch64 \
            --out-dir "$OUTDIR" \
            --repository-append "file://$OUTDIR" \
            --keyring-append /tmp/melange.rsa.pub \
            --signing-key /tmp/melange.rsa

          sudo chown -R "$(id -un):$(id -gn)" "$OUTDIR"

          echo "=== built artefacts ==="
          find "$OUTDIR" \( -name "*.apk" -o -name "APKINDEX.tar.gz" \) | sort

      - name: Serve packages via HTTP
        run: |
          # Serve apk-packages/ at http://localhost:8765 — apko uses --network
          # host so this is reachable from inside the apko-publish container.
          python3 -m http.server 8765 \
            --directory "${{ github.workspace }}/apk-packages" \
            --bind 127.0.0.1 &
          echo $! > /tmp/http-server.pid
          # Wait until the index is actually reachable before continuing.
          for i in $(seq 15); do
            curl -sf http://localhost:8765/x86_64/APKINDEX.tar.gz -o /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8765/x86_64/APKINDEX.tar.gz -o /dev/null \
            || { echo "ERROR: HTTP server not ready after 15 s"; exit 1; }
          echo "HTTP server ready at http://localhost:8765"

      # ── Build + publish image ───────────────────────────────────────────────
      - name: Compute image tag
        id: tags
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "all=ttl.sh/fips-java21-pr${{ github.event.pull_request.number }}:1h" >> $GITHUB_OUTPUT
          else
            BASE="ghcr.io/${{ github.repository_owner }}/fips-java21"
            TAGS="${BASE}:latest"
            [[ "${{ github.ref_type }}" == "tag" ]] && TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
            echo "all=${TAGS}" >> $GITHUB_OUTPUT
            echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        id: publish
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/java21/image.yaml
          tag: ${{ steps.tags.outputs.all }}
          repository-append: http://localhost:8765
          keyring-append: /tmp/melange.rsa.pub

      - name: Stop HTTP server
        if: always()
        run: kill $(cat /tmp/http-server.pid) || true

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-java21
          path: "*.sbom.json"
          if-no-files-found: ignore
