name: Build FIPS Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless OIDC

# ── Job graph ──────────────────────────────────────────────────────────────────
#
#   packages ──────────────────────┐
#                                  └──▶ build-java21
#   build-base  (independent)
#
# build-base and packages run in parallel.
# build-java21 waits for packages.

jobs:

  # ── Build local APK packages (bouncycastle-fips + bctls-fips) ──────────────
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs melange binary + bubblewrap (the sandboxed build runner)
      - uses: chainguard-dev/actions/setup-melange@main

      # Generate one ephemeral signing key shared across both package builds
      - uses: chainguard-dev/actions/melange-keygen@main
        with:
          signing-key-path: ${{ github.workspace }}/melange.rsa

      # Build both packages in one action call (multi-config).
      # The action auto-adds packages/out as an extra repo for bctls-fips,
      # which satisfies its runtime dependency on bouncycastle-fips.
      - uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          multi-config: >-
            packages/bouncycastle-fips/melange.yaml,packages/bctls-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: ${{ github.workspace }}/melange.rsa
          repository-path: ${{ github.workspace }}/packages/out

      # Upload packages + public key so build-java21 can consume them.
      # Retention is 1 day — these are ephemeral build intermediates.
      - uses: actions/upload-artifact@v4
        with:
          name: local-packages
          path: |
            packages/out
            melange.rsa.pub
          retention-days: 1

  # ── Build fips-base (no local packages needed) ─────────────────────────────
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          BASE="ghcr.io/${{ github.repository_owner }}/fips-base"
          TAGS="${BASE}:latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
          fi
          echo "all=${TAGS}" >> $GITHUB_OUTPUT
          echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT

      # PR: build only — validates the apko config without pushing
      - name: Build (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            --workdir "${{ github.workspace }}" \
            ghcr.io/wolfi-dev/sdk:latest \
            /usr/bin/apko build images/base/image.yaml fips-base:pr /tmp/fips-base.tar

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # main / tag: publish multi-arch image directly to the registry.
      # Space-separated tags in `tag` are word-split by the shell inside the
      # action, so apko receives them as separate positional arguments and
      # creates one manifest list with all requested tags.
      - name: Publish
        id: publish
        if: github.event_name != 'pull_request'
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/base/image.yaml
          tag: ${{ steps.tags.outputs.all }}

      # Sign by digest (precise) using keyless cosign (Sigstore Fulcio + Rekor)
      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-base
          path: "*.sbom.json"
          if-no-files-found: ignore

  # ── Build fips-java21 (requires local packages) ────────────────────────────
  build-java21:
    runs-on: ubuntu-latest
    needs: [packages]
    steps:
      - uses: actions/checkout@v4

      # Restores packages/out/ and melange.rsa.pub at the workspace root
      - name: Download local packages
        uses: actions/download-artifact@v4
        with:
          name: local-packages
          path: ${{ github.workspace }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="ghcr.io/${{ github.repository_owner }}/fips-java21"
          TAGS="${BASE}:latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${TAGS} ${BASE}:${{ github.ref_name }}"
          fi
          echo "all=${TAGS}" >> $GITHUB_OUTPUT
          echo "primary=${BASE}:latest" >> $GITHUB_OUTPUT

      # PR: build only
      - name: Build (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            --workdir "${{ github.workspace }}" \
            ghcr.io/wolfi-dev/sdk:latest \
            /usr/bin/apko build images/java21/image.yaml \
              --repository-append "file://${{ github.workspace }}/packages/out" \
              -k melange.rsa.pub \
              fips-java21:pr /tmp/fips-java21.tar

      - name: Set up cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        id: publish
        if: github.event_name != 'pull_request'
        uses: chainguard-images/actions/apko-publish@main
        with:
          config: images/java21/image.yaml
          tag: ${{ steps.tags.outputs.all }}
          repository-append: file://${{ github.workspace }}/packages/out
          keyring-append: ${{ github.workspace }}/melange.rsa.pub

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ steps.publish.outputs.digest }}

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-java21
          path: "*.sbom.json"
          if-no-files-found: ignore
