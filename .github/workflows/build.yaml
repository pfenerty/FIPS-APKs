name: Build and Publish APK Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write   # GitHub Pages OIDC deploy

# ── Job graph ──────────────────────────────────────────────────────────────────
#
#   build-packages  →  fips-compliance  →  deploy-pages (push/tag only)
#
# build-packages builds bouncycastle-fips and bctls-fips for x86_64 and
# aarch64 using melange.  It uploads two artifacts:
#   apk-packages-test   — consumed by fips-compliance (all events)
#   apk-packages-pages  — consumed by deploy-pages (push/tag only)
#
# fips-compliance installs the freshly-built APKs in a Wolfi container and
# runs FipsComplianceTest.java, verifying:
#   • JAR SHA-256 matches the CMVP-certified artifact
#   • BC-FIPS Power-On Self-Tests pass
#   • FIPS-approved algorithms work; non-FIPS algorithms are rejected
#   • TLS provider (bctls-fips) registers and provides TLSv1.3
# It uploads a fips-compliance-report artifact (Markdown + HTML).
#
# deploy-pages merges the APK repo and the compliance report HTML, then
# publishes the combined directory to GitHub Pages:
#
#   https://<org>.github.io/<repo>/
#     x86_64/
#       APKINDEX.tar.gz
#       bouncycastle-fips-*.apk
#       bctls-fips-*.apk
#     aarch64/
#       APKINDEX.tar.gz
#       bouncycastle-fips-*.apk
#       bctls-fips-*.apk
#     melange.rsa.pub
#     compliance-report.html   ← FIPS compliance evidence
#
# To use in an apko config:
#
#   repositories:
#     - https://packages.wolfi.dev/os
#     - https://<org>.github.io/<repo>
#   keyring:
#     - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
#     - https://<org>.github.io/<repo>/melange.rsa.pub
#   packages:
#     - bouncycastle-fips
#     - bctls-fips

jobs:

  # ── Build APK packages ───────────────────────────────────────────────────────
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: chainguard-dev/actions/setup-melange@main

      # PRs: generate an ephemeral signing key (packages are not published).
      # push/tag: decode the stable private key stored as a repository secret
      # so that the published APKs always carry the same trusted key.
      - name: Generate ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        run: melange keygen /tmp/melange.rsa

      - name: Restore stable signing key (push / tag)
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.MELANGE_SIGNING_KEY }}" ]; then
            echo "::error::MELANGE_SIGNING_KEY secret is not set"
            exit 1
          fi
          echo "${{ secrets.MELANGE_SIGNING_KEY }}" | base64 -d > /tmp/melange.rsa
          chmod 600 /tmp/melange.rsa
          openssl pkey -in /tmp/melange.rsa -pubout -out /tmp/melange.rsa.pub

      # Build bouncycastle-fips first; its output dir becomes the dependency
      # repo for bctls-fips so the runtime dep can be resolved at build time.
      - name: Build bouncycastle-fips
        uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          config: packages/bouncycastle-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: /tmp/melange.rsa
          repository-path: /tmp/apk-packages

      - name: Build bctls-fips
        uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          config: packages/bctls-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: /tmp/melange.rsa
          repository-path: /tmp/apk-packages

      # Publish the signing public key at the repository root so consumers can
      # add it to their apko keyring without an out-of-band key distribution step.
      - name: Copy public key to repository root
        run: cp /tmp/melange.rsa.pub /tmp/apk-packages/melange.rsa.pub

      # Upload packages for the fips-compliance job (all events).
      - name: Upload packages for compliance testing
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-test
          path: /tmp/apk-packages/
          retention-days: 1

      # push/tag only: upload packages for the deploy-pages job.
      - name: Upload packages for Pages deployment (push / tag)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages-pages
          path: /tmp/apk-packages/
          retention-days: 1

      # PRs: also upload as the plain "apk-packages" artifact for inspection.
      - name: Upload packages artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages
          path: /tmp/apk-packages/

  # ── FIPS compliance testing ───────────────────────────────────────────────────
  fips-compliance:
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: apk-packages-test
          path: /tmp/apk-packages

      - name: Run FIPS compliance tests
        run: |
          mkdir -p /tmp/fips-report
          docker run --rm \
            -v /tmp/apk-packages:/apk-packages:ro \
            -v "${{ github.workspace }}/tests":/repo/tests:ro \
            -v /tmp/fips-report:/tmp/fips-report \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e REPORT_DIR=/tmp/fips-report \
            cgr.dev/chainguard/wolfi-base \
            sh -c '
              set -e
              # Install JDK and APK tooling
              apk add --no-cache openjdk-21-default-jdk apk-tools

              # Trust the build signing key and register the local APK repo
              cp /apk-packages/melange.rsa.pub /etc/apk/keys/
              echo "/apk-packages" >> /etc/apk/repositories
              apk update

              # Install the packages under test (pulls in jitterentropy-library via dep)
              apk add --no-cache bouncycastle-fips bctls-fips

              # Run the compliance test suite
              sh /repo/tests/fips/run-fips-tests.sh
            '

      # Always upload the report so it is available for inspection even on failure
      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fips-compliance-report
          path: /tmp/fips-report/

      # Read the exit code written by run-fips-tests.sh and fail the job if non-zero
      - name: Fail job if tests failed
        run: |
          code=$(cat /tmp/fips-report/exit-code.txt 2>/dev/null || echo 1)
          if [ "$code" -ne 0 ]; then
            echo "::error::FIPS compliance tests failed (exit code $code). Download the fips-compliance-report artifact for details."
            exit "$code"
          fi

  # ── Publish to GitHub Pages ──────────────────────────────────────────────────
  deploy-pages:
    needs: [build-packages, fips-compliance]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Download APK packages
        uses: actions/download-artifact@v4
        with:
          name: apk-packages-pages
          path: /tmp/pages-content

      - name: Download compliance report
        uses: actions/download-artifact@v4
        with:
          name: fips-compliance-report
          path: /tmp/compliance-report

      # Merge the compliance report HTML into the APK repository directory
      # so it is served alongside the packages at <pages-url>/compliance-report.html
      - name: Merge compliance report into Pages content
        run: cp /tmp/compliance-report/compliance-report.html /tmp/pages-content/compliance-report.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-content/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
