name: Build and Publish APK Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write   # GitHub Pages OIDC deploy

# ── Job graph ──────────────────────────────────────────────────────────────────
#
#   build-packages  → deploy-pages (push/tag only)
#
# build-packages builds bouncycastle-fips and bctls-fips for x86_64 and
# aarch64 using melange, then either uploads an artifact (PRs) or publishes
# the APK repository to GitHub Pages (push/tag).
#
# The published GitHub Pages site is a standard Alpine/Wolfi APK repository:
#
#   https://<org>.github.io/<repo>/
#     x86_64/
#       APKINDEX.tar.gz
#       bouncycastle-fips-*.apk
#       bctls-fips-*.apk
#     aarch64/
#       APKINDEX.tar.gz
#       bouncycastle-fips-*.apk
#       bctls-fips-*.apk
#     melange.rsa.pub   ← public key for apko keyring
#
# To use in an apko config:
#
#   repositories:
#     - https://packages.wolfi.dev/os
#     - https://<org>.github.io/<repo>
#   keyring:
#     - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
#     - https://<org>.github.io/<repo>/melange.rsa.pub
#   packages:
#     - bouncycastle-fips
#     - bctls-fips

jobs:

  # ── Build APK packages ───────────────────────────────────────────────────────
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: chainguard-dev/actions/setup-melange@main

      # PRs: generate an ephemeral signing key (packages are not published).
      # push/tag: decode the stable private key stored as a repository secret
      # so that the published APKs always carry the same trusted key.
      - name: Generate ephemeral signing key (PR)
        if: github.event_name == 'pull_request'
        run: melange keygen /tmp/melange.rsa

      - name: Restore stable signing key (push / tag)
        if: github.event_name != 'pull_request'
        run: |
          if [ -z "${{ secrets.MELANGE_SIGNING_KEY }}" ]; then
            echo "::error::MELANGE_SIGNING_KEY secret is not set"
            exit 1
          fi
          echo "${{ secrets.MELANGE_SIGNING_KEY }}" | base64 -d > /tmp/melange.rsa
          chmod 600 /tmp/melange.rsa
          openssl pkey -in /tmp/melange.rsa -pubout -out /tmp/melange.rsa.pub

      # Build bouncycastle-fips first; its output dir becomes the dependency
      # repo for bctls-fips so the runtime dep can be resolved at build time.
      - name: Build bouncycastle-fips
        uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          config: packages/bouncycastle-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: /tmp/melange.rsa
          repository-path: /tmp/apk-packages

      - name: Build bctls-fips
        uses: chainguard-dev/actions/melange-build-pkg@main
        with:
          config: packages/bctls-fips/melange.yaml
          archs: x86_64,aarch64
          sign-with-key: true
          signing-key-path: /tmp/melange.rsa
          repository-path: /tmp/apk-packages

      # Publish the signing public key at the repository root so consumers can
      # add it to their apko keyring without an out-of-band key distribution step.
      - name: Copy public key to repository root
        run: cp /tmp/melange.rsa.pub /tmp/apk-packages/melange.rsa.pub

      # PRs: upload packages as a workflow artifact for inspection/testing.
      - name: Upload packages artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages
          path: /tmp/apk-packages/

      # push/tag: stage the APK repo for GitHub Pages deployment.
      - name: Upload Pages artifact (push / tag)
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/apk-packages/

  # ── Publish to GitHub Pages ──────────────────────────────────────────────────
  deploy-pages:
    needs: build-packages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
