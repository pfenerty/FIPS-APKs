# SunPKCS11 configuration to use the OpenSSL FIPS provider
# Place this file at /etc/java/pkcs11-fips.cfg inside the container image.
#
# The OpenSSL FIPS provider module (fips.so) implements the CMVP-validated
# cryptographic boundary.  The jitterentropy-library provides SP 800-90B
# entropy, making this configuration kernel-independent.

name = OpenSSL-FIPS
library = /usr/lib/ossl-modules/fips.so
showInfo = false
