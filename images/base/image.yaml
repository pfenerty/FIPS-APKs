# FIPS-hardened Wolfi base OS image
#
# Packages:
#   - wolfi-base:          BusyBox + musl libc minimal userspace
#   - ca-certificates-bundle: Trusted TLS root certificates
#   - openssl:             OpenSSL 3.4+ with FIPS provider module (CMVP #4282)
#                          and patches enforcing FIPS-only algorithm policy
#   - jitterentropy-library: Userspace entropy source (NIST SP 800-90B ESV)
#                            makes the FIPS provider kernel-independent —
#                            no FIPS kernel required on the host

contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - https://packages.wolfi.dev/os
  packages:
    - wolfi-base
    - ca-certificates-bundle
    - openssl
    - jitterentropy-library

archs:
  - x86_64
  - aarch64
